# ==================== POSTGRESQL R2DBC CONFIGURATION ====================
spring.r2dbc.url=${SPRING_R2DBC_URL:r2dbc:postgresql://localhost:5432/biashara_book}
spring.r2dbc.username=${POSTGRES_USER:postgres}
spring.r2dbc.password=${POSTGRES_PASSWORD:postgres}
spring.r2dbc.pool.enabled=true

# ==================== FLYWAY MIGRATION CONFIGURATION ====================
spring.flyway.enabled=true
spring.flyway.url=${SPRING_FLYWAY_URL:jdbc:postgresql://localhost:5432/biashara_book}
spring.flyway.user=${POSTGRES_USER:postgres}
spring.flyway.password=${POSTGRES_PASSWORD:postgres}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.validate-on-migrate=false
spring.flyway.validate-migration-naming=false
spring.flyway.repair=true

# ==================== PAYMENT GATEWAY CONFIGURATION ====================
payment.gateway.fastduka.base-url=https://api.fastduka.co.ke/api
payment.gateway.fastduka.api-key=${FASTDUKA_API_KEY}
payment.gateway.fastduka.paybill=${FASTDUKA_PAYBILL}
payment.gateway.fastduka.org-id=${FASTDUKA_ORGID}
payment.gateway.fastduka.config-id=${FASTDUKA_CONFIG_ID}
payment.gateway.fastduka.max-poll-attempts=10
payment.gateway.fastduka.poll-interval-seconds=5
payment.gateway.fastduka.max-amount=250000